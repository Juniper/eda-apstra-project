---
- name: Create security zone in Apstra
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Lock Blueprint
      block:
        - include_role:
            name: lock_blueprint
      rescue:
        - include_role:
            name: unlock_blueprint

    - name: Create K8s Security Zone
      block:
        - include_role:
            name: k8s_create_security_zone
      rescue:
        - include_role:
            name: unlock_blueprint

    - name: Unlock Blueprint (if previous roles succeeded)
      include_role:
        name: unlock_blueprint